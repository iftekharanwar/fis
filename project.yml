name: PhysicsGame
options:
  bundleIdPrefix: com.iftekharanwar
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Local signing team. Carried here so `xcodegen generate` preserves it
    # instead of resetting to empty (which breaks on-device builds). Replace
    # with your own team ID, or blank it if you set the team in Xcode instead.
    DEVELOPMENT_TEAM: T993T6534U
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  PhysicsGame:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources
      - path: Resources
        excludes:
          - "**/README.md"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: PhysicsGame
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UIUserInterfaceStyle: Dark
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        # iPhone: portrait only (unchanged). iOS applies the base key on
        # iPhone and the ~ipad variant on iPad automatically, so iPad gets
        # all orientations while iPhone stays locked — no scene delegate needed.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
        UIAppFonts:
          - Anton-Regular.ttf
          - BarlowCondensed-Regular.ttf
          - BarlowCondensed-Italic.ttf
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iftekharanwar.physicsgame
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Info.plist

  PhysicsGameTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests
      - path: Resources/Scenarios
      - path: Resources/Audio
    dependencies:
      - target: PhysicsGame
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iftekharanwar.physicsgame.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"

schemes:
  PhysicsGame:
    build:
      targets:
        PhysicsGame: all
        PhysicsGameTests: [test]
    test:
      targets:
        - PhysicsGameTests
      gatherCoverageData: false
